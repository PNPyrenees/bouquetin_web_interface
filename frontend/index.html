<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Plateforme de suivi des bouquetins - Parc National des Pyrénées">
  <title>Plateforme de suivi des bouquetins</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/main.css">
</head>

<body>

  <header id="header">

    <div class="header-top">
      <div class="header-top-left">
        <img src="assets/img/logo-parc.svg" alt="Logo Parc National des Pyrénées" class="logo-parc">
      </div>

      <nav class="header-nav" id="mainNav">
        <a href="#" class="nav-link active">Carte</a>
        <a href="#" class="nav-link">Individus</a>
        <a href="#" class="nav-link">Rapports/statistiques</a>
        <a href="#" class="nav-link nav-link-add">+ Ajouter</a>
      </nav>

      <div class="header-top-right">
        <div class="user-chip" id="userChip">
          <span class="user-avatar">AD</span>
          <span class="user-name">Session</span>
          <span class="user-badge">ADMIN</span>
        </div>
      </div>
    </div>

    <div class="header-bottom">
      <div class="header-bottom-left">
        <div class="sync-info">
          <span class="sync-label">DERNIÈRE SYNCHRONISATION</span>
          <span class="sync-date" id="lastSync">24/04/2026 - 08:00</span>
        </div>
      </div>

      <div class="header-bottom-center">
        <div class="filter-group">
          <div class="filter-block">
            <label class="filter-label">Individu</label>
            <select class="filter-select" id="selectIndividu">
              <option>- Tous les individus -</option>
            </select>
          </div>
          <div class="filter-block">
            <label class="filter-label">Saisons</label>
            <select class="filter-select" id="selectSaison">
              <option>- Toutes les saisons -</option>
            </select>
          </div>
        </div>
      </div>

      <div class="header-bottom-right">
        <div class="header-separator"></div>
        <div class="platform-title">
          <span class="platform-title-text">
            <span class="platform-line1">PLATEFORME</span>
            <span class="platform-line2">DE SUIVI DES BOUQUETINS</span>
          </span>
          <img src="assets/img/noun-alpine-ibex-3634051.svg" alt="Icône bouquetin" class="ibex-icon">
        </div>
      </div>
    </div>

  </header>

</body>

</html>
